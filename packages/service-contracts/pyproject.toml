[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "copilot-service-contracts"
version = "0.1.0"
description = "Constants-only internal service contracts for 0xCopilot"
requires-python = ">=3.11"
dependencies = []

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
# Glob, not an enumerated list: a new runtime data file (e.g. the
# surface_spec.schema.json added alongside adapter_allowlist.json) must not be
# silently dropped from the wheel — that crash-loops every pip-installed
# consumer (packaged desktop, Docker images) while PYTHONPATH-based dev/CI
# keeps working.
copilot_service_contracts = ["*.json"]
