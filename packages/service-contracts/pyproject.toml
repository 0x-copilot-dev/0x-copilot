[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "enterprise-service-contracts"
version = "0.1.0"
description = "Constants-only internal service contracts for Enterprise Search"
requires-python = ">=3.11"
dependencies = []

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
enterprise_service_contracts = ["adapter_allowlist.json"]
