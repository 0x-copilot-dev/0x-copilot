<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>design-parity · login · DESIGN baseline</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <!-- Login styling lives entirely in the shared design-kit copilot.css
         (.login-* / .mrow / .empty / .sig-* / .cbtn / .backlink / .mw). Served
         from the tools/design-parity root so ../../../design-kit resolves.
         Render a specific state with ?state=pick|wallets|connecting|werr|sign|google|gerr|done. -->
    <link rel="stylesheet" href="../../../design-kit/copilot.css" />
  </head>
  <body>
    <div id="app-root"></div>

    <script
      src="https://unpkg.com/react@18.3.1/umd/react.development.js"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
      crossorigin="anonymous"
    ></script>

    <!-- Shared kit stubs first (Icon/Mark globals), then the real design
         component, which self-mounts into #app-root. -->
    <script type="text/babel" src="../../../design-kit/stubs.js"></script>
    <script type="text/babel" src="copilot-login.jsx"></script>
  </body>
</html>
