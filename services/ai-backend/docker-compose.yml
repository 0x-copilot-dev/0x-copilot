services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: ai_backend
      POSTGRES_USER: ai_backend
      POSTGRES_PASSWORD: ai_backend
    ports:
      - "5432:5432"
    volumes:
      - ai_backend_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_backend -d ai_backend"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../..
      dockerfile: services/ai-backend/Dockerfile
    env_file:
      - .env
    environment:
      RUNTIME_STORE_BACKEND: postgres
      DATABASE_URL: postgresql://ai_backend:ai_backend@postgres:5432/ai_backend
      # P2 — API and worker are separate processes here, so the in-memory
      # asyncio.Condition bus would never deliver wakeups across them and
      # SSE would fall back to a 2s poll. Postgres LISTEN/NOTIFY makes the
      # cross-process wakeup work in milliseconds; the API holds a
      # dedicated LISTEN connection for the channel.
      RUNTIME_EVENT_BUS_BACKEND: postgres
      PORT: 8000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build:
      context: ../..
      dockerfile: services/ai-backend/Dockerfile
    command: ["python", "-m", "runtime_worker"]
    env_file:
      - .env
    environment:
      RUNTIME_STORE_BACKEND: postgres
      DATABASE_URL: postgresql://ai_backend:ai_backend@postgres:5432/ai_backend
      # P2 — must match the API's bus backend. The postgres adapter only
      # fires NOTIFY when this is set (otherwise the LISTEN side has
      # nothing to wake on).
      RUNTIME_EVENT_BUS_BACKEND: postgres
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  ai_backend_postgres:
