# Pricing overrides — the reviewed backstop applied on top of LiteLLM.
#
# See: services/ai-backend/docs/refactor/01-pricing-from-litellm.md
#
# LiteLLM (`litellm.model_cost`) is the pricing source of truth. This file
# exists ONLY for models LiteLLM lacks or misprices. Every entry MUST carry a
# `reason` field — the loader fails closed if it is missing. Treat the reason as
# the audit trail: when an override outlives its purpose (LiteLLM ships the
# model), the next reviewer reads the reason and removes the entry.
#
# Overrides win over LiteLLM on a `(provider, model_name, region)` collision.
# The provider slug is the canonical run-path slug (`gemini`, not `google`);
# the loader normalises either form at lookup time.
#
# All rate values are micro-USD per 1M tokens (integer). 1 USD =
# 1_000_000 micro_usd. Override entries are stamped with
# `pricing_source: override` by the loader and inherit `overrides_version` as
# their `pricing_version`.
#
# The prior migration entries (claude-opus-4-7, gpt-5, gpt-5.4-mini,
# gemini-2.5-pro, gemini-2.5-flash) were STALE placeholders that pinned values
# 2–10x above the real provider catalog; their own `reason` fields flagged them
# for verification. LiteLLM carries the real provider prices for all of them, so
# they were dropped (trusting LiteLLM fixes an over-billing bug).

overrides_version: "gemini-3-flash-2026-07"

overrides:
  # gemini-3-flash — not present in LiteLLM 1.93.0 `model_cost` (only model of
  # the 12 product models LiteLLM lacks). No published Google price exists for
  # this model yet, so we mirror gemini-2.5-flash's LiteLLM rates
  # ($0.30 in / $2.50 out / $0.03 cached per 1M, 1,048,576 ctx) as the most
  # defensible proxy. Remove (or re-price) once LiteLLM ships gemini-3-flash or
  # Google publishes an official rate.
  - provider: gemini
    model_name: gemini-3-flash
    region: global
    input_per_1m_micro_usd: 300_000
    output_per_1m_micro_usd: 2_500_000
    cached_input_per_1m_micro_usd: 30_000
    context_window_tokens: 1_048_576
    reason: "Not in LiteLLM 1.93.0; no published Google price. Mirrors gemini-2.5-flash LiteLLM rates as a proxy — re-verify when LiteLLM ships the model or Google publishes a rate."
