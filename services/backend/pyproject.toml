[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "enterprise-search-backend"
version = "0.1.0"
description = "Core product backend for Enterprise Search"
requires-python = ">=3.11"
dependencies = [
  "fastapi",
  "httpx",
  "psycopg[binary]",
  "pydantic>=2",
  "python-dotenv",
  "uvicorn",
]

[project.optional-dependencies]
dev = [
  "pytest",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src", "../../packages/service-contracts/src"]
