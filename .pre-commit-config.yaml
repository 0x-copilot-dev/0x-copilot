minimum_pre_commit_version: "3.7.0"

default_language_version:
  python: python3.13

exclude: |
  (?x)^(
    node_modules/|
    dist/|
    \.vite/|
    \.venv/|
    .*\/\.venv/|
    artifacts/
  )

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        args: ["--markdown-linebreak-ext=md"]
      - id: end-of-file-fixer
      - id: check-added-large-files
      - id: check-json
      - id: check-merge-conflict
      - id: check-toml
      - id: check-yaml
      - id: mixed-line-ending
        args: ["--fix=lf"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff-check
        args: ["--fix"]
        exclude: "(^|/)requirements\\.txt$"
      - id: ruff-format
        exclude: "(^|/)requirements\\.txt$"

  - repo: local
    hooks:
      - id: prettier
        name: prettier
        entry: prettier --write --ignore-unknown
        language: node
        additional_dependencies:
          - prettier@3.8.3
        types_or:
          - css
          - javascript
          - json
          - jsx
          - markdown
          - ts
          - tsx
          - yaml

  - repo: https://github.com/pre-commit/pygrep-hooks
    rev: v1.10.0
    hooks:
      - id: python-no-eval
      - id: python-no-log-warn

  - repo: local
    hooks:
      - id: forbid-content-logging-keywords
        name: forbid LLM/PII content as logger keyword args
        description: |
          Structural defense against logging user prompts, model responses,
          tool inputs/outputs, or request/response bodies. Loggers must take
          typed metadata only -- emit identifiers, status, and counts, never
          content. If you see this firing, route the field through metadata
          with a non-content key (e.g. metadata={"input_tokens": n}).
        entry: '\b(logger|log|_logger)\.(debug|info|warning|warn|error|exception|critical)\([^)]*\b(messages|prompt|prompt_text|completion|user_input|request_body|response_body|model_response|tool_input|tool_output|raw_payload)\s*='
        language: pygrep
        files: \.py$
        exclude: ^services/.+/tests/

      - id: audit-in-transaction
        name: audit append must be inside store.transaction() block
        description: |
          C3 atomicity: every (write + audit append) site in the backend
          service must run inside one transaction so a partial failure rolls
          back both rows. This static check walks service.py's AST and
          flags any ``self.store.append_*audit*(...)`` call whose enclosing
          function does not also enter a ``with store.transaction()`` block
          (calls passing through ``conn=...`` are exempt -- they delegate
          the txn to their caller).
        entry: python tools/check_audit_in_transaction.py
        language: system
        pass_filenames: false
        files: ^services/backend/src/backend_app/service\.py$
      - id: check-reader-methods
        name: "@reader-tagged methods must not contain write SQL"
        description: |
          C10 read-replica safety: methods marked with the ``@reader``
          decorator may be routed to a read-only Postgres replica. The AST
          walker rejects any string literal inside a ``@reader`` method that
          matches the word ``INSERT|UPDATE|DELETE|TRUNCATE|MERGE`` (whole
          word, case-insensitive) so accidental writes never land on a path
          that may target the replica.
        entry: python tools/check_reader_methods.py
        language: system
        pass_filenames: false
        files: ^services/ai-backend/src/.*\.py$
