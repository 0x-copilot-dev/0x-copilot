# Thin wrapper around deploy.yml for production promotions.
# Production deploys are gated by:
#   - GitHub Environment "tenant-<id>-production" (required reviewers, wait timer)
#   - Staged-rollout policy enforced inside deploy.yml (canary -> early -> general)
# Use force_deploy: true ONLY with documented risk acceptance and a second approver.

name: deploy-production

on:
  workflow_dispatch:
    inputs:
      tenant_id:
        description: Tenant ID (from deploy/tenants.yml)
        type: string
        required: true
      release_sha:
        description: Git SHA to promote (default = latest green main)
        type: string
        required: false
      force_deploy:
        description: Bypass staged-rollout policy (requires second approver)
        type: boolean
        default: false

jobs:
  deploy:
    uses: ./.github/workflows/deploy.yml
    with:
      tenant_id: ${{ inputs.tenant_id }}
      environment: production
      release_sha: ${{ inputs.release_sha }}
      force_deploy: ${{ inputs.force_deploy }}
    secrets: inherit
