name: ci-backend-facade

on:
  pull_request:
    paths:
      - "services/backend-facade/**"
      - "services/backend-facade/requirements.in"
      - "packages/service-contracts/**"
      - ".github/workflows/ci-backend-facade.yml"
  push:
    branches:
      - main
    paths:
      - "services/backend-facade/**"
      - "services/backend-facade/requirements.in"
      - "packages/service-contracts/**"
      - ".github/workflows/ci-backend-facade.yml"
  workflow_dispatch:

concurrency:
  group: ci-backend-facade-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-and-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: services/backend-facade/requirements.txt

      - name: Install tooling and service deps
        run: |
          python -m pip install --upgrade pip pip-audit cyclonedx-bom
          python -m pip install ./packages/service-contracts
          python -m pip install -r services/backend-facade/requirements.txt --require-hashes

      - name: Verify requirements.txt is compiled from requirements.in
        run: |
          python -m pip install pip-tools==7.5.3
          cd services/backend-facade
          pip-compile --generate-hashes --resolver=backtracking requirements.in -o requirements.txt
          cd ../..
          git diff --exit-code services/backend-facade/requirements.txt

      - name: Audit Python dependencies (facade only)
        run: pip-audit -r services/backend-facade/requirements.txt

      - name: Run pytest (facade only)
        run: |
          cd services/backend-facade && PYTHONPATH="../../packages/service-contracts/src:src" python -m pytest tests

      - name: Generate SBOM (facade)
        run: |
          mkdir -p artifacts/sbom
          cyclonedx-py requirements services/backend-facade/requirements.txt -o artifacts/sbom/backend-facade.bom.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-backend-facade
          path: artifacts/sbom/backend-facade.bom.json
