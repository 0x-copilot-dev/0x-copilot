name: ci-backend

on:
  pull_request:
    paths:
      - "services/backend/**"
      - "services/backend/requirements.in"
      - "packages/service-contracts/**"
      - "packages/audit-chain/**"
      - ".github/workflows/ci-backend.yml"
  push:
    branches:
      - main
    paths:
      - "services/backend/**"
      - "services/backend/requirements.in"
      - "packages/service-contracts/**"
      - "packages/audit-chain/**"
      - ".github/workflows/ci-backend.yml"
  workflow_dispatch:

concurrency:
  group: ci-backend-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-and-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: services/backend/requirements.txt

      - name: Install tooling and service deps
        run: |
          python -m pip install --upgrade pip pip-audit cyclonedx-bom
          python -m pip install ./packages/service-contracts
          python -m pip install ./packages/audit-chain
          python -m pip install -r services/backend/requirements.txt --require-hashes

      - name: Verify requirements.txt is compiled from requirements.in
        run: |
          python -m pip install pip-tools==7.5.3
          cd services/backend
          pip-compile --generate-hashes --resolver=backtracking requirements.in -o requirements.txt
          cd ../..
          git diff --exit-code services/backend/requirements.txt

      - name: Audit Python dependencies (backend only)
        run: pip-audit -r services/backend/requirements.txt

      - name: Run pytest (backend only)
        run: |
          cd services/backend && PYTHONPATH="../../packages/service-contracts/src:src" python -m pytest tests

      - name: A10 RBAC scope coverage check
        # Default-deny: every route must declare its RBAC policy via
        # RequireScopes / RequireRoles / RequireAnyScope / public_route.
        # Adding a new route without an annotation fails this step.
        run: |
          cd services/backend && PYTHONPATH="../../packages/service-contracts/src:src" python ../../tools/check_route_scopes.py --service backend

      - name: Generate SBOM (backend)
        run: |
          mkdir -p artifacts/sbom
          cyclonedx-py requirements services/backend/requirements.txt -o artifacts/sbom/backend.bom.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-backend
          path: artifacts/sbom/backend.bom.json
