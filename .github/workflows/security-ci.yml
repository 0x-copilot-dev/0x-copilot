name: security-ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  security-events: write

jobs:
  test-and-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install pre-commit
        run: python -m pip install --upgrade pip pre-commit

      - name: Run pre-commit hooks
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          if [ -z "$BASE_SHA" ] || [[ "$BASE_SHA" =~ ^0+$ ]]; then
            pre-commit run --all-files --show-diff-on-failure
          else
            pre-commit run --from-ref "$BASE_SHA" --to-ref "$HEAD_SHA" --show-diff-on-failure
          fi

      - name: Install Node dependencies
        run: npm ci

      - name: Build and typecheck workspaces
        run: |
          npm run typecheck --workspaces --if-present
          npm run build --workspaces --if-present

      - name: Audit Node dependencies
        run: npm audit --audit-level=high

      - name: Install Python security tools
        run: python -m pip install --upgrade pip pip-audit cyclonedx-bom

      - name: Audit Python dependencies
        run: |
          pip-audit -r services/backend/requirements.txt
          pip-audit -r services/backend-facade/requirements.txt
          pip-audit -r services/ai-backend/requirements.txt

      - name: Run Python tests
        run: |
          python -m pip install ./packages/service-contracts
          python -m pip install -r services/backend/requirements.txt
          python -m pip install -r services/backend-facade/requirements.txt
          python -m pip install -r services/ai-backend/requirements.txt
          (cd services/backend && PYTHONPATH="../../packages/service-contracts/src:src" python -m pytest tests)
          (cd services/backend-facade && PYTHONPATH="../../packages/service-contracts/src:src" python -m pytest tests)
          (cd services/ai-backend && PYTHONPATH="../../packages/service-contracts/src:src" python -m pytest tests)

      - name: Generate SBOMs
        run: |
          mkdir -p artifacts/sbom
          npx --yes @cyclonedx/cyclonedx-npm --output-file artifacts/sbom/npm.bom.json
          cyclonedx-py requirements services/backend/requirements.txt -o artifacts/sbom/backend.bom.json
          cyclonedx-py requirements services/backend-facade/requirements.txt -o artifacts/sbom/backend-facade.bom.json
          cyclonedx-py requirements services/ai-backend/requirements.txt -o artifacts/sbom/ai-backend.bom.json

      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sboms
          path: artifacts/sbom
