name: ci-frontend

on:
  pull_request:
    paths:
      - "apps/frontend/**"
      - "packages/api-types/**"
      - "packages/design-system/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.base.json"
      - ".github/workflows/ci-frontend.yml"
  push:
    branches:
      - main
    paths:
      - "apps/frontend/**"
      - "packages/api-types/**"
      - "packages/design-system/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.base.json"
      - ".github/workflows/ci-frontend.yml"
  workflow_dispatch:

concurrency:
  group: ci-frontend-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Typecheck packages and build frontend
        run: |
          npm run typecheck --workspace @0x-copilot/api-types
          npm run typecheck --workspace @0x-copilot/design-system
          npm run typecheck --workspace @0x-copilot/frontend
          npm run build --workspace @0x-copilot/frontend

      - name: Audit Node dependencies
        run: npm audit --audit-level=high

      - name: Generate SBOM (npm workspace)
        run: |
          mkdir -p artifacts/sbom
          npx --yes @cyclonedx/cyclonedx-npm --output-file artifacts/sbom/npm.bom.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-frontend-npm
          path: artifacts/sbom/npm.bom.json
