name: ci-frontend

on:
  pull_request:
    paths:
      - "apps/frontend/**"
      - "packages/api-types/**"
      - "packages/design-system/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.base.json"
      - ".github/workflows/ci-frontend.yml"
  push:
    branches:
      - main
    paths:
      - "apps/frontend/**"
      - "packages/api-types/**"
      - "packages/design-system/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.base.json"
      - ".github/workflows/ci-frontend.yml"
  workflow_dispatch:

concurrency:
  group: ci-frontend-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Typecheck packages and build frontend
        run: |
          npm run typecheck --workspace @enterprise-search/api-types
          npm run typecheck --workspace @enterprise-search/design-system
          npm run typecheck --workspace @enterprise-search/frontend
          npm run build --workspace @enterprise-search/frontend

      - name: Audit Node dependencies
        run: npm audit --audit-level=high

      - name: Generate SBOM (npm workspace)
        run: |
          mkdir -p artifacts/sbom
          npx --yes @cyclonedx/cyclonedx-npm --output-file artifacts/sbom/npm.bom.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-frontend-npm
          path: artifacts/sbom/npm.bom.json
