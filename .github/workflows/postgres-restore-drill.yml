name: postgres-restore-drill

# C12 — proves the documented restore procedure actually works.
# Without a passing restore drill, "we have backups" is not a control
# (CLAUDE.md §Compliance reviews).
#
# Trigger surfaces:
#   - Scheduled weekly (Sundays 06:00 UTC).
#   - Any PR that touches a migration, the seed fixture, the manifest,
#     either restore_smoke.py, or this workflow.
#   - workflow_dispatch for ad-hoc operator runs.
#
# Failure pages on-call (the on-call rotation listens to GitHub Actions
# failures on this workflow specifically — see runbook).

on:
  pull_request:
    paths:
      - "services/backend/migrations/**"
      - "services/ai-backend/migrations/**"
      - "tests/fixtures/postgres-restore/**"
      - "services/backend/scripts/restore_smoke.py"
      - "services/ai-backend/scripts/restore_smoke.py"
      - ".github/workflows/postgres-restore-drill.yml"
  push:
    branches:
      - main
    paths:
      - "services/backend/migrations/**"
      - "services/ai-backend/migrations/**"
      - "tests/fixtures/postgres-restore/**"
      - "services/backend/scripts/restore_smoke.py"
      - "services/ai-backend/scripts/restore_smoke.py"
      - ".github/workflows/postgres-restore-drill.yml"
  schedule:
    # Sundays 06:00 UTC. Misfire tolerance is fine — the manifest is
    # deterministic so a delayed run produces the same result.
    - cron: "0 6 * * 0"
  workflow_dispatch:

concurrency:
  group: postgres-restore-drill-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  restore-drill:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: drill
          POSTGRES_PASSWORD: drill
          POSTGRES_DB: drill
        ports:
          - 5432:5432
        # ``pg_isready`` runs every 5s up to 12 times; matches the
        # default GitHub Actions Postgres-service health-check pattern.
        options: >-
          --health-cmd "pg_isready -U drill"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    env:
      DATABASE_URL: postgres://drill:drill@localhost:5432/drill
      BACKEND_DATABASE_URL: postgres://drill:drill@localhost:5432/drill
      RUNTIME_DATABASE_URL: postgres://drill:drill@localhost:5432/drill

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.13"

      - name: Install psql client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Install Python deps used by the smoke scripts
        # Both restore_smoke.py scripts only need psycopg + PyYAML +
        # yoyo-migrations; avoid pulling in either service's full
        # requirements.txt so the drill stays fast.
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            'psycopg[binary]==3.3.3' \
            'PyYAML>=6.0' \
            'yoyo-migrations==9.0.0'

      - name: Apply backend migrations
        run: |
          cd services/backend
          yoyo apply --batch --database "${BACKEND_DATABASE_URL}" migrations/

      - name: Apply ai-backend migrations
        run: |
          cd services/ai-backend
          yoyo apply --batch --database "${RUNTIME_DATABASE_URL}" migrations/

      - name: Load restore-drill seed fixture
        run: |
          PGPASSWORD=drill psql \
            -h localhost -U drill -d drill \
            -v ON_ERROR_STOP=1 \
            -f tests/fixtures/postgres-restore/seed.sql

      - name: Backend restore smoke
        run: |
          python services/backend/scripts/restore_smoke.py

      - name: AI-backend restore smoke
        run: |
          python services/ai-backend/scripts/restore_smoke.py

      - name: Manifest drift check
        # If a migration changed the schema in a way that affects
        # row-shape/counts (e.g. a new seed row), the smoke scripts
        # already failed above. This step echoes the manifest path so
        # operators know exactly what to update.
        if: failure()
        run: |
          echo "::error::Restore drill failed. If a migration changed the seed shape:"
          echo "::error::  1. Edit tests/fixtures/postgres-restore/seed.sql"
          echo "::error::  2. Edit tests/fixtures/postgres-restore/manifest.yaml"
          echo "::error::  3. Re-run this workflow locally via 'act' or push a commit"
