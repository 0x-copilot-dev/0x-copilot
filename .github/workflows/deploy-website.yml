name: deploy-website

# Marketing site — static Astro build, published to the org GitHub Pages repo
# (0x-copilot-dev.github.io) and served at https://0xcopilot.tech via the
# published public/CNAME. Path-filtered so product changes never trigger a
# site deploy, per the CI rules in CLAUDE.md.

on:
  push:
    branches: [main]
    paths:
      - "apps/website/**"
      - ".github/workflows/deploy-website.yml"
  workflow_dispatch:

permissions:
  contents: read

# Never race two deploys; let an in-flight one finish rather than publishing
# a half-written site.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        # Org site is served at the domain root (0x-copilot-dev.github.io/),
        # so SITE_BASE must be "/". Getting this wrong 404s every stylesheet.
        # The link check below fails the build if the emitted HTML disagrees.
        env:
          SITE_BASE: /
        run: npm run build --workspace @0x-copilot/website

      - name: Verify the build is intact
        # 0xcopilot.tech DNS now points at GitHub Pages (4 A + 4 AAAA on @,
        # www CNAME → 0x-copilot-dev.github.io.), so the site is served at the
        # custom domain. public/CNAME must ship in dist/ and contain exactly
        # that apex — without it GitHub drops the custom domain on the next
        # force-push and stops serving HTTPS for it.
        run: |
          set -euo pipefail
          for f in index.html token.html docs.html media/app-run.png favicon.svg; do
            test -f "apps/website/dist/$f" || { echo "::error::missing dist/$f"; exit 1; }
          done
          if [ ! -f apps/website/dist/CNAME ]; then
            echo "::error::dist/CNAME missing — custom domain 0xcopilot.tech would be dropped"
            exit 1
          fi
          got="$(tr -d '[:space:]' < apps/website/dist/CNAME)"
          if [ "$got" != "0xcopilot.tech" ]; then
            echo "::error::dist/CNAME is '$got', expected '0xcopilot.tech'"
            exit 1
          fi
          echo "build OK (CNAME=0xcopilot.tech)"

      - name: Verify every referenced asset resolves at the deploy base
        # Regression guard: fetches what the pages actually request, not what
        # we assume. Keeps root vs subpath base mistakes from shipping.
        run: node apps/website/scripts/check-links.mjs apps/website/dist "${SITE_BASE}"
        env:
          SITE_BASE: /

      - name: Publish to 0x-copilot-dev.github.io
        uses: peaceiris/actions-gh-pages@v4
        with:
          deploy_key: ${{ secrets.PAGES_DEPLOY_KEY }}
          external_repository: 0x-copilot-dev/0x-copilot-dev.github.io
          publish_dir: apps/website/dist
          publish_branch: main
          force_orphan: true
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
          commit_message: "deploy: website from 0x-copilot@${{ github.sha }}"
