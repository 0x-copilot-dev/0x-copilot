# Repo-wide governance: formatting/lint hooks (pre-commit) and secret scanning.
# Does not install application dependencies — see ci-backend, ci-backend-facade, ci-ai-backend, ci-frontend.

name: ci-repo

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-repo-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  lint-and-secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Install pre-commit
        run: python -m pip install --upgrade pip pre-commit

      - name: Run pre-commit hooks
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          if [ -z "$BASE_SHA" ] || [[ "$BASE_SHA" =~ ^0+$ ]]; then
            pre-commit run --all-files --show-diff-on-failure
          else
            pre-commit run --from-ref "$BASE_SHA" --to-ref "$HEAD_SHA" --show-diff-on-failure
          fi

      # Dependabot-authored PRs run with a restricted GITHUB_TOKEN that
      # gitleaks-action can't use against the issues/PR API ("Resource not
      # accessible by integration"). The restriction is determined by the
      # PR author, not the actor who triggered the run — so a maintainer
      # pushing a follow-up commit to a dependabot/* branch still gets the
      # restricted token. Match on the PR author so the skip survives those
      # follow-ups; bot PRs only touch package manifests/lockfiles, and a
      # full secret scan still runs on every push to main.
      - name: Secret scan
        if: github.event.pull_request.user.login != 'dependabot[bot]'
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  tenants-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Install lint deps
        run: python -m pip install --upgrade pip pyyaml jsonschema

      - name: Validate deploy/tenants.yml against schema
        run: python deploy/scripts/validate_tenants.py
