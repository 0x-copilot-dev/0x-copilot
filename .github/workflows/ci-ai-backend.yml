name: ci-ai-backend

on:
  pull_request:
    paths:
      - "services/ai-backend/**"
      - "packages/service-contracts/**"
      - "packages/api-types/**"
      - "packages/audit-chain/**"
      - ".github/workflows/ci-ai-backend.yml"
  push:
    branches:
      - main
    paths:
      - "services/ai-backend/**"
      - "packages/service-contracts/**"
      - "packages/api-types/**"
      - "packages/audit-chain/**"
      - ".github/workflows/ci-ai-backend.yml"
  workflow_dispatch:

concurrency:
  group: ci-ai-backend-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-and-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: services/ai-backend/requirements.txt

      - name: Install tooling and service deps
        run: |
          python -m pip install --upgrade pip pip-audit cyclonedx-bom
          python -m pip install ./packages/service-contracts
          python -m pip install ./packages/audit-chain
          python -m pip install -r services/ai-backend/requirements.txt

      - name: Verify installed dependency graph (pip check)
        run: cd services/ai-backend && python -m pip check

      - name: Audit Python dependencies (ai-backend only)
        run: pip-audit -r services/ai-backend/requirements.txt

      - name: Run pytest (ai-backend only)
        run: |
          cd services/ai-backend && PYTHONPATH="../../packages/service-contracts/src:src" python -m pytest tests

      - name: A10 RBAC scope coverage check
        # Default-deny: every route must declare its RBAC policy via
        # RequireScopes / RequireRoles / RequireAnyScope / public_route.
        # Adding a new route without an annotation fails this step.
        run: |
          cd services/ai-backend && PYTHONPATH="../../packages/service-contracts/src:src" python ../../tools/check_route_scopes.py --service ai-backend

      - name: Generate SBOM (ai-backend)
        run: |
          mkdir -p artifacts/sbom
          cyclonedx-py requirements services/ai-backend/requirements.txt -o artifacts/sbom/ai-backend.bom.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sbom-ai-backend
          path: artifacts/sbom/ai-backend.bom.json
