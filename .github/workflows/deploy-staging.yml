# Thin wrapper around deploy.yml for staging promotions.
# For per-tenant fan-out, run deploy.yml directly via workflow_dispatch per tenant
# or extend this file with a setup job that reads deploy/tenants.yml into a matrix.

name: deploy-staging

on:
  workflow_dispatch:
    inputs:
      tenant_id:
        description: Tenant ID (from deploy/tenants.yml)
        type: string
        required: true
      release_sha:
        description: Git SHA to promote (default = latest green main)
        type: string
        required: false

jobs:
  deploy:
    uses: ./.github/workflows/deploy.yml
    with:
      tenant_id: ${{ inputs.tenant_id }}
      environment: staging
      release_sha: ${{ inputs.release_sha }}
      force_deploy: false
    secrets: inherit
