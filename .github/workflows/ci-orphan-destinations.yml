name: ci-orphan-destinations

# PRD-13 standing gate (docs/plan/design-parity-remediation/PRD-13-dead-code.md):
# packages/chat-surface is the single-source-of-truth interaction layer; its only
# sanctioned contract with the two hosts is the barrel src/index.ts. A component
# exported from that barrel but MOUNTED BY NO HOST and consumed by no other
# chat-surface module is dead weight — the exact shape of ChatsSidebar (498 lines
# fetching a route no service served) and the ChatsDestination forwarder both
# hosts routed around. A prior repo-wide audit put dead code at ~95k LOC; this
# gate makes the NEXT such addition fail CI instead of accreting silently.
#
# The gate (tools/check_orphan_destinations.py) fails if any PascalCase value
# export from src/index.ts whose source is an `export function …: ReactElement`
# module under src/destinations/ or src/shell/ is referenced by no host
# (apps/frontend/src, apps/desktop/renderer) and no non-test, non-index module
# inside packages/chat-surface/src. Escape hatch: a
# `// orphan-destination-waiver: owner=<PRD or issue> — <reason>` on the export
# line. Pure stdlib — no service deps, no TS parsing, no network — so it runs on
# every relevant PR in seconds.

on:
  pull_request:
    paths:
      - "packages/chat-surface/src/**"
      - "apps/frontend/src/**"
      - "apps/desktop/renderer/**"
      - "tools/check_orphan_destinations.py"
      - "tools/test_check_orphan_destinations.py"
      - ".github/workflows/ci-orphan-destinations.yml"
  push:
    branches:
      - main
    paths:
      - "packages/chat-surface/src/**"
      - "apps/frontend/src/**"
      - "apps/desktop/renderer/**"
      - "tools/check_orphan_destinations.py"
      - "tools/test_check_orphan_destinations.py"
      - ".github/workflows/ci-orphan-destinations.yml"
  workflow_dispatch:

concurrency:
  group: ci-orphan-destinations-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  orphan-destinations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"

      # The gate's own unit tests (detection, host-mount, in-package consumer,
      # waiver, shell-scope, real-tree baseline) — proves the guard works before
      # we trust its verdict.
      - name: Install pytest
        run: python -m pip install --upgrade pip pytest

      - name: Test the gate
        run: python -m pytest tools/test_check_orphan_destinations.py -q

      # The gate itself, over the real chat-surface barrel + host trees.
      - name: Run the orphan-destinations gate
        run: python tools/check_orphan_destinations.py
