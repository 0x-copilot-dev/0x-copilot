# Build and push service images to ghcr.io on main (path-filtered) or manual dispatch.
# Publishes SBOM-adjacent evidence: image digests in deployment-manifest.json, Trivy SARIF (best-effort),
# and build attestations (best-effort when the repository supports artifact attestations).

name: release-images

on:
  push:
    branches:
      - main
    paths:
      - "services/backend/**"
      - "services/backend-facade/**"
      - "services/ai-backend/**"
      - "apps/frontend/**"
      - "packages/service-contracts/**"
      - "packages/api-types/**"
      - "packages/design-system/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.base.json"
      - ".github/workflows/release-images.yml"
  workflow_dispatch:

concurrency:
  group: release-images-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write
  security-events: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - dockerfile: services/backend/Dockerfile
            image_name: enterprise-search-backend
          - dockerfile: services/backend-facade/Dockerfile
            image_name: enterprise-search-backend-facade
          - dockerfile: services/ai-backend/Dockerfile
            image_name: enterprise-search-ai-backend
          - dockerfile: apps/frontend/Dockerfile
            image_name: enterprise-search-frontend
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase repository owner for GHCR
        id: lc
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.lc.outputs.owner }}/${{ matrix.image_name }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Attest build provenance
        continue-on-error: true
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/${{ steps.lc.outputs.owner }}/${{ matrix.image_name }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ghcr.io/${{ steps.lc.outputs.owner }}/${{ matrix.image_name }}@${{ steps.build.outputs.digest }}
          format: sarif
          output: trivy-${{ matrix.image_name }}.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true
        with:
          sarif_file: trivy-${{ matrix.image_name }}.sarif
          category: trivy-${{ matrix.image_name }}

      - name: Write image reference fragment
        run: |
          printf '%s' "ghcr.io/${{ steps.lc.outputs.owner }}/${{ matrix.image_name }}@${{ steps.build.outputs.digest }}" > "${{ matrix.image_name }}.image-ref.txt"

      - name: Upload image reference fragment
        uses: actions/upload-artifact@v4
        with:
          name: release-image-${{ matrix.image_name }}
          path: ${{ matrix.image_name }}.image-ref.txt

  deployment-manifest:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase repository owner
        id: lc
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Download image reference fragments
        uses: actions/download-artifact@v4
        with:
          pattern: release-image-*
          merge-multiple: true
          path: fragments

      - name: Build deployment-manifest.json
        run: |
          python3 << 'PY'
          import json
          import os
          from pathlib import Path

          images = []
          fragments = Path("fragments")
          if fragments.exists():
              for p in fragments.rglob("*.image-ref.txt"):
                  component = p.name.removesuffix(".image-ref.txt")
                  reference = p.read_text().strip()
                  if reference:
                      images.append({"component": component, "reference": reference})

          manifest = {
              "schema": "enterprise-search/deployment-manifest/v1",
              "git_sha": os.environ["GITHUB_SHA"],
              "workflow_run_id": os.environ["GITHUB_RUN_ID"],
              "workflow_run_url": f"{os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}",
              "registry_owner": os.environ["IMAGE_OWNER"],
              "images": sorted(images, key=lambda x: x["component"]),
          }
          Path("deployment-manifest.json").write_text(json.dumps(manifest, indent=2) + "\n")
          PY
        env:
          IMAGE_OWNER: ${{ steps.lc.outputs.owner }}

      - name: Upload deployment manifest
        uses: actions/upload-artifact@v4
        with:
          name: deployment-manifest
          path: deployment-manifest.json
