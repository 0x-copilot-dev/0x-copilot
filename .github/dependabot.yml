version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      actions-minor-patch:
        update-types:
          - minor
          - patch
    reviewers:
      - 0x-copilot/security-reviewers
    commit-message:
      prefix: "ci(deps)"
      include: scope
    labels:
      - dependencies
      - github-actions

  - package-ecosystem: pip
    directory: /services/backend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      backend-minor-patch:
        update-types:
          - minor
          - patch
    reviewers:
      - 0x-copilot/backend-owners
      - 0x-copilot/security-reviewers
    commit-message:
      prefix: "deps(backend)"
      include: scope
    labels:
      - dependencies
      - python
      - backend

  - package-ecosystem: pip
    directory: /services/backend-facade
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      facade-minor-patch:
        update-types:
          - minor
          - patch
    reviewers:
      - 0x-copilot/backend-owners
      - 0x-copilot/security-reviewers
    commit-message:
      prefix: "deps(facade)"
      include: scope
    labels:
      - dependencies
      - python
      - backend-facade

  - package-ecosystem: pip
    directory: /services/ai-backend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      ai-backend-minor-patch:
        update-types:
          - minor
          - patch
    ignore:
      # marshmallow 4 is unreachable while we depend on langchain-community
      # (it pulls in dataclasses-json==0.6.7, which hard-pins marshmallow<4).
      # No newer dataclasses-json exists. Re-enable when langchain-community
      # ships a release that uses a marshmallow-4-compatible
      # dataclasses-json.
      - dependency-name: marshmallow
        update-types:
          - version-update:semver-major
    reviewers:
      - 0x-copilot/ai-runtime-owners
      - 0x-copilot/security-reviewers
    commit-message:
      prefix: "deps(ai-backend)"
      include: scope
    labels:
      - dependencies
      - python
      - ai-backend

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      npm-minor-patch:
        update-types:
          - minor
          - patch
    ignore:
      # zod 4 is a breaking major, deferred deliberately: zod is pinned in
      # lockstep across the chat-transport and desktop surfaces, so it must
      # move as one coordinated migration — not via an automated bump.
      - dependency-name: zod
        versions:
          - ">=4"
      # recharts 3 is a breaking major, deferred deliberately: v3 is a full
      # API rewrite; chart migrations happen intentionally, not via
      # automated bumps.
      - dependency-name: recharts
        versions:
          - ">=3"
    reviewers:
      - 0x-copilot/frontend-owners
      - 0x-copilot/security-reviewers
    commit-message:
      prefix: "deps(npm)"
      include: scope
    labels:
      - dependencies
      - npm

  - package-ecosystem: docker
    directories:
      - /services/backend
      - /services/backend-facade
      - /services/ai-backend
      - /apps/frontend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    reviewers:
      - 0x-copilot/security-reviewers
    commit-message:
      prefix: "deps(docker)"
      include: scope
    labels:
      - dependencies
      - docker
