appId: com.enterprise-search.atlas
productName: Atlas
directories:
  buildResources: build
  output: dist
files:
  - out/**/*
  - package.json
asar: true
mac:
  category: public.app-category.productivity
  target:
    - target: dir
      arch:
        - arm64
        - x64
win:
  target:
    - target: dir
      arch:
        - x64
linux:
  target:
    - target: dir
      arch:
        - x64
