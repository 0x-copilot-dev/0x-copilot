# electron-builder config for the 0xCopilot desktop app.
#
# Product identity: appId com.0x-copilot.app + productName "0xCopilot".
# electron-updater keys auto-update off these; keep them stable across releases.
#
# Layout handshake (see main/services/runtime-paths.ts):
#   1. a prepack step stages the self-contained runtime for the TARGET
#      platform/arch:  node tools/desktop-runtime/stage.mjs --platform <p> --arch <a>
#      -> apps/desktop/resources/runtime/<p>-<a>/{python,postgres,services}
#   2. extraResources below maps apps/desktop/resources/runtime -> <resourcesPath>/runtime
#   3. at runtime resolveRuntimePaths() reads <resourcesPath>/runtime/<p>-<a>/...
# The npm `dist:*` scripts run steps 1+2 (stage + build + electron-builder).

appId: com.0x-copilot.app
productName: 0xCopilot

directories:
  buildResources: build
  output: dist

# App code only. extraResources (below) carries the python/postgres runtime,
# which MUST live outside the asar (native binaries cannot be spawned from an
# archive). electron-updater metadata is emitted from `publish` below.
files:
  - out/**/*
  - package.json
asar: true

# Local iteration uses normal compression for speed; CI overrides to maximum
# (electron-builder -c.compression=maximum) for smaller release artifacts.
compression: normal

# Stage the TARGET runtime into <resourcesPath>/runtime. Only the build arch's
# `<platform>-<arch>` subtree is present in a clean staging dir, so the app is
# single-arch per build even though the config is arch-agnostic.
extraResources:
  - from: resources/runtime
    to: runtime
    filter:
      - "**/*"

# Icons are committed binaries generated from build/icon-source.svg by
# build/generate-icons.mjs (macOS host). Regenerate them when the mark changes.
mac:
  icon: build/icon.icns
  category: public.app-category.productivity
  # dmg for the installer, zip for electron-updater (mac updates are delivered
  # as zip — dmg alone cannot be applied by electron-updater).
  target:
    - target: dmg
    - target: zip
  # Hardened runtime + entitlements are required for notarization. The nested
  # python/.so and postgres binaries are pre-signed by build/sign-nested.js
  # (afterPack) so electron-builder's outer signature stays valid.
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # Notarization is GATED on env presence: electron-builder notarizes only
  # when signing succeeds AND Apple API credentials are in the environment
  # (APPLE_API_KEY + APPLE_API_KEY_ID + APPLE_API_ISSUER). Local unsigned
  # builds (CSC_IDENTITY_AUTO_DISCOVERY=false) skip both signing and notarize.

win:
  icon: build/icon.ico
  target:
    - target: nsis
      arch:
        - x64

# Per-user install: no admin elevation, installs under %LOCALAPPDATA%.
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true

# Pre-sign nested Mach-O binaries (python .so/.dylib, postgres) before the
# app bundle is signed. No-ops cleanly on unsigned local builds.
afterPack: build/sign-nested.js

# electron-updater feed. DO NOT publish from local `dist:*` scripts
# (--publish never); CI publishes with --publish always on tagged releases.
publish:
  provider: github
  owner: 0x-copilot-dev
  repo: 0x-copilot
